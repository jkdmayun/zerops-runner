name: Build One-File XMRig ARM64 Static No-Donate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    steps:
      - name: Build one static xmrig binary
        shell: bash
        run: |
          set -euo pipefail

          cat > "$GITHUB_WORKSPACE/build.sh" <<'SH'
          #!/bin/sh
          set -eu

          apk add --no-cache \
            bash \
            git \
            build-base \
            cmake \
            autoconf \
            automake \
            libtool \
            pkgconf \
            linux-headers \
            python3 \
            perl \
            wget \
            tar \
            gzip \
            xz \
            ca-certificates \
            coreutils \
            file \
            binutils

          WORK="/work/work"
          OUT="/work/out"
          SRC="$WORK/xmrig"

          rm -rf "$WORK" "$OUT"
          mkdir -p "$WORK" "$OUT"

          git clone --depth 1 --branch v6.26.0 \
            https://github.com/xmrig/xmrig.git \
            "$SRC"

          EXPECTED_COMMIT="b2ca72480c58d197e18c885d9fc1a0c8d517e60a"
          ACTUAL_COMMIT="$(git -C "$SRC" rev-parse HEAD)"

          if [ "$ACTUAL_COMMIT" != "$EXPECTED_COMMIT" ]; then
            echo "Unexpected XMRig commit: $ACTUAL_COMMIT"
            exit 1
          fi

          python3 - "$SRC" <<'PY'
          from pathlib import Path
          import re
          import sys

          src = Path(sys.argv[1])

          cmake_file = src / "CMakeLists.txt"
          network_file = src / "src/net/Network.cpp"
          donate_file = src / "src/donate.h"
          cpu_file = src / "cmake/cpu.cmake"

          def replace_once(text, pattern, replacement, label, flags=re.MULTILINE):
              updated, count = re.subn(
                  pattern,
                  replacement,
                  text,
                  count=1,
                  flags=flags,
              )

              if count != 1:
                  raise SystemExit(
                      f"{label}: expected one match, found {count}"
                  )

              return updated

          def clean_write(path, text):
              text = "\n".join(
                  line.rstrip()
                  for line in text.splitlines()
              ) + "\n"

              path.write_text(text)

          cmake = cmake_file.read_text()

          cmake = replace_once(
              cmake,
              r"^[ \t]*src/net/strategies/DonateStrategy\.h[ \t]*\n",
              "",
              "Remove DonateStrategy header from CMake"
          )

          cmake = replace_once(
              cmake,
              r"^[ \t]*src/net/strategies/DonateStrategy\.cpp[ \t]*\n",
              "",
              "Remove DonateStrategy source from CMake"
          )

          clean_write(cmake_file, cmake)

          network = network_file.read_text()

          network = replace_once(
              network,
              r'^#include "net/strategies/DonateStrategy\.h"[ \t]*\n',
              '#include "base/kernel/interfaces/IStrategy.h"\n',
              "Replace DonateStrategy include"
          )

          network = replace_once(
              network,
              r"^[ \t]*m_donate[ \t]*=[ \t]*new[ \t]+DonateStrategy[ \t]*\([ \t]*controller[ \t]*,[ \t]*this[ \t]*\)[ \t]*;[ \t]*\n",
              "        m_donate = nullptr;\n",
              "Disable DonateStrategy construction"
          )

          network = replace_once(
              network,
              r"\n[ \t]*if[ \t]*\([ \t]*![ \t]*donate[ \t]*&&[ \t]*m_donate[ \t]*\)[ \t]*\{\n[ \t]*static_cast<DonateStrategy[ \t]*\*>[ \t]*\([ \t]*m_donate[ \t]*\)->update[ \t]*\([ \t]*client[ \t]*,[ \t]*job[ \t]*\)[ \t]*;\n[ \t]*\}[ \t]*\n",
              "\n",
              "Remove DonateStrategy update path",
              flags=re.MULTILINE,
          )

          if "DonateStrategy" in network:
              raise SystemExit(
                  "DonateStrategy reference remains in Network.cpp"
              )

          if "new DonateStrategy" in network:
              raise SystemExit(
                  "DonateStrategy construction remains in Network.cpp"
              )

          clean_write(network_file, network)

          donate = donate_file.read_text()

          donate = replace_once(
              donate,
              r"(kDefaultDonateLevel[ \t]*=[ \t]*)1\b",
              r"\g<1>0",
              "Set default donation level to zero",
              flags=0,
          )

          donate = replace_once(
              donate,
              r"(kMinimumDonateLevel[ \t]*=[ \t]*)1\b",
              r"\g<1>0",
              "Set minimum donation level to zero",
              flags=0,
          )

          clean_write(donate_file, donate)

          cpu = cpu_file.read_text()

          cpu = replace_once(
              cpu,
              r"^[ \t]*CHECK_CXX_COMPILER_FLAG\(-march=armv8-a\+crypto[ \t]+XMRIG_ARM_CRYPTO\)[ \t]*$",
              "        set(XMRIG_ARM_CRYPTO OFF)",
              "Force generic ARMv8 build"
          )

          clean_write(cpu_file, cpu)

          if "src/net/strategies/DonateStrategy.cpp" in cmake_file.read_text():
              raise SystemExit(
                  "DonateStrategy.cpp is still included in CMake"
              )

          if "src/net/strategies/DonateStrategy.h" in cmake_file.read_text():
              raise SystemExit(
                  "DonateStrategy.h is still included in CMake"
              )

          if "DonateStrategy" in network_file.read_text():
              raise SystemExit(
                  "DonateStrategy remains in Network.cpp"
              )

          if "kDefaultDonateLevel = 0" not in donate_file.read_text():
              raise SystemExit(
                  "Default donation level was not set to zero"
              )

          if "kMinimumDonateLevel = 0" not in donate_file.read_text():
              raise SystemExit(
                  "Minimum donation level was not set to zero"
              )

          print("Source patch verification passed.")
          PY

          cd "$SRC/scripts"

          ./build_deps.sh

          cmake -S "$SRC" -B "$WORK/build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DXMRIG_DEPS="$SRC/scripts/deps" \
            -DBUILD_STATIC=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DARM_V8=ON \
            -DWITH_RANDOMX=ON \
            -DWITH_ARGON2=ON \
            -DWITH_TLS=ON \
            -DWITH_HWLOC=ON \
            -DWITH_ASM=ON \
            -DWITH_BENCHMARK=ON \
            -DWITH_ENV_VARS=ON \
            -DWITH_HTTP=OFF \
            -DWITH_DMI=OFF \
            -DWITH_MSR=OFF \
            -DWITH_OPENCL=OFF \
            -DWITH_CUDA=OFF \
            -DWITH_KAWPOW=OFF \
            -DWITH_GHOSTRIDER=OFF \
            -DWITH_CN_LITE=OFF \
            -DWITH_CN_HEAVY=OFF \
            -DWITH_CN_PICO=OFF \
            -DWITH_CN_FEMTO=OFF

          cmake --build "$WORK/build" --parallel 2

          cp "$WORK/build/xmrig" "$OUT/xmrig"
          chmod 755 "$OUT/xmrig"

          nm -C "$OUT/xmrig" | grep -q "DonateStrategy" && {
            echo "DonateStrategy symbol found in output."
            exit 1
          }

          strings "$OUT/xmrig" | grep -Eqi \
            'donate\.(v2|ssl)\.xmrig\.com' && {
            echo "Developer donation host found in output."
            exit 1
          }

          strip --strip-unneeded "$OUT/xmrig"

          file "$OUT/xmrig" | grep -qi "statically linked" || {
            echo "Output is not a static executable."
            exit 1
          }

          readelf -d "$OUT/xmrig" 2>/dev/null | grep -q "NEEDED" && {
            echo "Dynamic library dependency found."
            exit 1
          }

          "$OUT/xmrig" --version

          sha256sum "$OUT/xmrig" > "$OUT/xmrig.sha256"

          echo "Build finished successfully."
          SH

          chmod +x "$GITHUB_WORKSPACE/build.sh"

          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            alpine:3.21 \
            sh /work/build.sh

      - name: Upload one-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-aarch64-static
          path: |
            out/xmrig
            out/xmrig.sha256
          if-no-files-found: error
