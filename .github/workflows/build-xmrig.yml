name: Build XMRig ARM64 Static No-Donate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 55

    steps:
      - name: Build static ARM64 XMRig from official source
        shell: bash
        run: |
          set -euo pipefail

          cat > "$GITHUB_WORKSPACE/build.sh" <<'SH'
          #!/bin/sh
          set -eu

          apk add --no-cache \
            bash \
            git \
            build-base \
            cmake \
            autoconf \
            automake \
            libtool \
            pkgconf \
            linux-headers \
            perl \
            wget \
            tar \
            gzip \
            xz \
            ca-certificates \
            coreutils \
            file \
            binutils

          WORK="/work/work"
          OUT="/work/out"
          SRC="$WORK/xmrig"
          BASE="$WORK/xmrig-baseline"

          rm -rf "$WORK" "$OUT"
          mkdir -p "$WORK" "$OUT/runtime"

          cd "$WORK"

          git clone --depth 1 --branch v6.26.0 https://github.com/xmrig/xmrig.git xmrig

          EXPECTED_COMMIT="b2ca72480c58d197e18c885d9fc1a0c8d517e60a"
          ACTUAL_COMMIT="$(git -C "$SRC" rev-parse HEAD)"

          if [ "$ACTUAL_COMMIT" != "$EXPECTED_COMMIT" ]; then
            echo "Unexpected XMRig source commit: $ACTUAL_COMMIT"
            exit 1
          fi

          sed -i '/DonateStrategy/d' "$SRC/CMakeLists.txt"
          sed -i '/DonateStrategy/d' "$SRC/src/net/Network.cpp"

          sed -i 's/constexpr const int kDefaultDonateLevel = 1;/constexpr const int kDefaultDonateLevel = 0;/' "$SRC/src/donate.h"
          sed -i 's/constexpr const int kMinimumDonateLevel = 1;/constexpr const int kMinimumDonateLevel = 0;/' "$SRC/src/donate.h"

          rm -f "$SRC/src/net/strategies/DonateStrategy.cpp"
          rm -f "$SRC/src/net/strategies/DonateStrategy.h"

          if grep -R -n \
            --exclude-dir=.git \
            --include='*.cpp' \
            --include='*.h' \
            --include='CMakeLists.txt' \
            'DonateStrategy' \
            "$SRC"
          then
            echo "Donation strategy reference remains in source."
            exit 1
          fi

          if grep -n 'new DonateStrategy' "$SRC/src/net/Network.cpp"; then
            echo "Donation strategy construction remains in Network.cpp."
            exit 1
          fi

          if ! grep -q 'kDefaultDonateLevel = 0' "$SRC/src/donate.h"; then
            echo "Default donation level was not changed to zero."
            exit 1
          fi

          if ! grep -q 'kMinimumDonateLevel = 0' "$SRC/src/donate.h"; then
            echo "Minimum donation level was not changed to zero."
            exit 1
          fi

          echo "Donation source removal verification passed."

          cd "$SRC"

          git diff --check
          git rev-parse HEAD > "$OUT/XMRIG-COMMIT.txt"
          git diff --binary > "$OUT/SOURCE-PATCH.diff"
          cp LICENSE "$OUT/LICENSE"

          cd "$SRC/scripts"
          ./build_deps.sh

          build_xmrig() {
            SOURCE_DIR="$1"
            BUILD_DIR="$2"
            OUTPUT_FILE="$3"

            cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" \
              -DCMAKE_BUILD_TYPE=Release \
              -DXMRIG_DEPS="$SOURCE_DIR/scripts/deps" \
              -DBUILD_STATIC=ON \
              -DARM_V8=ON \
              -DWITH_RANDOMX=ON \
              -DWITH_ARGON2=ON \
              -DWITH_TLS=ON \
              -DWITH_HWLOC=ON \
              -DWITH_ASM=ON \
              -DWITH_BENCHMARK=ON \
              -DWITH_ENV_VARS=ON \
              -DWITH_HTTP=OFF \
              -DWITH_DMI=OFF \
              -DWITH_MSR=OFF \
              -DWITH_OPENCL=OFF \
              -DWITH_CUDA=OFF \
              -DWITH_KAWPOW=OFF \
              -DWITH_GHOSTRIDER=OFF \
              -DWITH_CN_LITE=OFF \
              -DWITH_CN_HEAVY=OFF \
              -DWITH_CN_PICO=OFF \
              -DWITH_CN_FEMTO=OFF

            cmake --build "$BUILD_DIR" --parallel 2

            cp "$BUILD_DIR/xmrig" "$OUTPUT_FILE"
            chmod 755 "$OUTPUT_FILE"
            strip --strip-unneeded "$OUTPUT_FILE"
          }

          build_xmrig \
            "$SRC" \
            "$WORK/build-crypto" \
            "$OUT/runtime/xmrig-aarch64-crypto"

          cp -a "$SRC" "$BASE"

          sed -i 's/^[[:space:]]*CHECK_CXX_COMPILER_FLAG(-march=armv8-a+crypto XMRIG_ARM_CRYPTO)[[:space:]]*$/        set(XMRIG_ARM_CRYPTO OFF)/' "$BASE/cmake/cpu.cmake"

          if ! grep -q 'set(XMRIG_ARM_CRYPTO OFF)' "$BASE/cmake/cpu.cmake"; then
            echo "Baseline ARM build patch failed."
            exit 1
          fi

          build_xmrig \
            "$BASE" \
            "$WORK/build-baseline" \
            "$OUT/runtime/xmrig-aarch64-baseline"

          cat > "$OUT/runtime/run.sh" <<'EOF'
          #!/bin/sh
          set -eu

          DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          VARIANT="${XMRIG_ARM_VARIANT:-auto}"

          case "$VARIANT" in
            crypto)
              exec "$DIR/xmrig-aarch64-crypto" "$@"
              ;;
            baseline)
              exec "$DIR/xmrig-aarch64-baseline" "$@"
              ;;
            auto)
              if awk '
                /^[Ff]eatures/ && $0 ~ /(^|[[:space:]])aes([[:space:]]|$)/ {
                  found=1
                }
                END {
                  exit !found
                }
              ' /proc/cpuinfo 2>/dev/null
              then
                exec "$DIR/xmrig-aarch64-crypto" "$@"
              fi

              exec "$DIR/xmrig-aarch64-baseline" "$@"
              ;;
            *)
              echo "Invalid XMRIG_ARM_VARIANT: $VARIANT"
              echo "Allowed values: auto, crypto, baseline"
              exit 2
              ;;
          esac
          EOF

          cat > "$OUT/runtime/verify.sh" <<'EOF'
          #!/bin/sh
          set -eu

          for BIN in xmrig-aarch64-baseline xmrig-aarch64-crypto
          do
            test -x "./$BIN"
            "./$BIN" --version

            if strings "./$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation runtime string found in $BIN"
              exit 1
            fi
          done

          echo "Verification passed."
          EOF

          cat > "$OUT/runtime/config.json.example" <<'EOF'
          {
            "autosave": false,
            "background": false,
            "donate-level": 0,
            "cpu": {
              "enabled": true,
              "huge-pages": true,
              "huge-pages-jit": true,
              "yield": false,
              "max-threads-hint": 100,
              "asm": true
            },
            "randomx": {
              "init": -1,
              "mode": "fast",
              "1gb-pages": false,
              "rdmsr": false,
              "wrmsr": false
            },
            "pools": [
              {
                "coin": "monero",
                "url": "POOL_HOST:PORT",
                "user": "YOUR_XMR_PUBLIC_ADDRESS",
                "pass": "aarch64-2c",
                "tls": true,
                "keepalive": true
              }
            ]
          }
          EOF

          chmod 755 "$OUT/runtime/run.sh"
          chmod 755 "$OUT/runtime/verify.sh"

          for BIN in "$OUT/runtime/xmrig-aarch64-baseline" "$OUT/runtime/xmrig-aarch64-crypto"
          do
            if ! file "$BIN" | grep -qi 'statically linked'; then
              echo "Binary is not statically linked: $BIN"
              exit 1
            fi

            if readelf -d "$BIN" 2>/dev/null | grep -q 'NEEDED'; then
              echo "Dynamic dependency found: $BIN"
              exit 1
            fi

            "$BIN" --version

            if strings "$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation runtime string found: $BIN"
              exit 1
            fi
          done

          cat > "$OUT/BUILD-MANIFEST.txt" <<EOF
          XMRig version: v6.26.0
          XMRig source commit: $(git -C "$SRC" rev-parse HEAD)
          Build target: Linux aarch64, musl, static ELF
          Static dependencies: libuv, hwloc, OpenSSL
          Enabled: RandomX, Argon2, TLS, hwloc, ASM, benchmark, ARMv8
          Disabled: DonateStrategy, HTTP API, MSR, CUDA, OpenCL
          Binaries:
            xmrig-aarch64-baseline = ARMv8 generic compatibility
            xmrig-aarch64-crypto   = ARMv8 with AES/crypto extensions
          EOF

          cd "$OUT"
          sha256sum runtime/* > SHA256SUMS

          tar -czf xmrig-aarch64-musl-static-nodonate-v6.26.0.tar.gz \
            runtime \
            SHA256SUMS \
            BUILD-MANIFEST.txt \
            XMRIG-COMMIT.txt \
            SOURCE-PATCH.diff \
            LICENSE

          chmod -R a+rX "$OUT"
          SH

          chmod +x "$GITHUB_WORKSPACE/build.sh"

          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            alpine:3.21 \
            sh /work/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-aarch64-musl-static-nodonate-v6.26.0
          path: out/
          if-no-files-found: error
