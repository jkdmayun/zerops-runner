name: Build XMRig ARM64 Static No-Donate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - name: Build fully static ARM64 XMRig
        shell: bash
        run: |
          set -euo pipefail

          cat > "$GITHUB_WORKSPACE/build.sh" <<'SH'
          #!/bin/sh
          set -eu

          apk add --no-cache \
            bash \
            git \
            build-base \
            cmake \
            autoconf \
            automake \
            libtool \
            pkgconf \
            linux-headers \
            perl \
            python3 \
            wget \
            tar \
            gzip \
            xz \
            ca-certificates \
            coreutils \
            file \
            binutils

          WORK="/work/work"
          OUT="/work/out"
          SRC="$WORK/xmrig"
          BASE="$WORK/xmrig-baseline"

          rm -rf "$WORK" "$OUT"
          mkdir -p "$WORK" "$OUT/runtime"

          cd "$WORK"
          git clone --depth 1 --branch v6.26.0 https://github.com/xmrig/xmrig.git xmrig

          python3 - "$SRC" <<'PY'
          from pathlib import Path
          import sys

          src = Path(sys.argv[1])

          def fail(message):
              raise SystemExit(message)

          def remove_block(text, marker):
              start = text.find(marker)
              if start < 0:
                  fail(f"Cannot find block marker: {marker}")

              brace = text.find("{", start)
              if brace < 0:
                  fail(f"Cannot find opening brace after: {marker}")

              depth = 0
              end = None

              for i in range(brace, len(text)):
                  ch = text[i]

                  if ch == "{":
                      depth += 1
                  elif ch == "}":
                      depth -= 1

                      if depth == 0:
                          end = i + 1
                          break

              if end is None:
                  fail(f"Cannot find closing brace after: {marker}")

              while end < len(text) and text[end] in " \t":
                  end += 1

              if end < len(text) and text[end] == "\n":
                  end += 1

              return text[:start] + text[end:]

          def remove_all_blocks(text, marker):
              while marker in text:
                  text = remove_block(text, marker)

              return text

          def replace_required(text, old, new, label):
              count = text.count(old)

              if count != 1:
                  fail(f"{label}: expected exactly 1 match, found {count}")

              return text.replace(old, new, 1)

          cmake_file = src / "CMakeLists.txt"
          network_cpp = src / "src/net/Network.cpp"
          network_h = src / "src/net/Network.h"
          donate_h = src / "src/donate.h"

          cmake = cmake_file.read_text()

          cmake = replace_required(
              cmake,
              "    src/net/strategies/DonateStrategy.h\n",
              "",
              "Remove DonateStrategy header from CMakeLists.txt"
          )

          cmake = replace_required(
              cmake,
              "    src/net/strategies/DonateStrategy.cpp\n",
              "",
              "Remove DonateStrategy source from CMakeLists.txt"
          )

          cmake_file.write_text(cmake)

          network = network_cpp.read_text()

          network = replace_required(
              network,
              '#include "net/strategies/DonateStrategy.h"\n',
              "",
              "Remove DonateStrategy include"
          )

          network = replace_required(
              network,
              """    const Pools &pools = controller->config()->pools();

              m_strategy = pools.createStrategy(m_state);

              """,
              """    m_strategy = controller->config()->pools().createStrategy(m_state);

              """,
              "Simplify pool strategy initialization"
          )

          network = remove_all_blocks(
              network,
              "if (pools.donateLevel() > 0)"
          )

          network = replace_required(
              network,
              "    delete m_donate;\n",
              "",
              "Remove m_donate destruction"
          )

          network = remove_all_blocks(
              network,
              "if (m_donate && m_donate == strategy)"
          )

          network = remove_all_blocks(
              network,
              "if (m_donate && m_donate->isActive() && m_donate != strategy)"
          )

          network = replace_required(
              network,
              "    setJob(client, job, m_donate == strategy);\n",
              "    setJob(client, job);\n",
              "Remove donation job routing"
          )

          network = remove_all_blocks(
              network,
              "if (result.index == 1 && m_donate)"
          )

          network = remove_all_blocks(
              network,
              "if (!donate && m_donate)"
          )

          network = remove_all_blocks(
              network,
              "if (m_donate)"
          )

          network = replace_required(
              network,
              "void xmrig::Network::setJob(IClient *client, const Job &job, bool donate)",
              "void xmrig::Network::setJob(IClient *client, const Job &job)",
              "Remove donate parameter from setJob definition"
          )

          network = replace_required(
              network,
              "    m_controller->miner()->setJob(job, donate);\n",
              "    m_controller->miner()->setJob(job, false);\n",
              "Force all jobs to normal pool"
          )

          network_cpp.write_text(network)

          header = network_h.read_text()

          header = replace_required(
              header,
              "    void setJob(IClient *client, const Job &job, bool donate);\n",
              "    void setJob(IClient *client, const Job &job);\n",
              "Remove donate parameter from Network.h"
          )

          header = replace_required(
              header,
              "    IStrategy *m_donate = nullptr;\n",
              "",
              "Remove m_donate member from Network.h"
          )

          network_h.write_text(header)

          donate_h.write_text(
              """#ifndef XMRIG_DONATE_H
          #define XMRIG_DONATE_H

          constexpr const int kDefaultDonateLevel = 0;
          constexpr const int kMinimumDonateLevel = 0;

          #endif // XMRIG_DONATE_H
          """
          )

          donate_cpp = src / "src/net/strategies/DonateStrategy.cpp"
          donate_header = src / "src/net/strategies/DonateStrategy.h"

          if not donate_cpp.exists() or not donate_header.exists():
              fail("DonateStrategy source files are missing before removal")

          donate_cpp.unlink()
          donate_header.unlink()

          checks = [
              ("DonateStrategy", [
                  src / "CMakeLists.txt",
                  src / "src/net/Network.cpp",
                  src / "src/net/Network.h",
              ]),
              ("m_donate", [
                  src / "src/net/Network.cpp",
                  src / "src/net/Network.h",
              ]),
              ("dev donate", [
                  src / "src/net/Network.cpp",
                  src / "src/net/Network.h",
              ]),
              ("donate.v2.xmrig.com", [
                  src / "src/net/Network.cpp",
                  src / "src/net/Network.h",
              ]),
              ("donate.ssl.xmrig.com", [
                  src / "src/net/Network.cpp",
                  src / "src/net/Network.h",
              ]),
          ]

          for needle, files in checks:
              for file in files:
                  if needle in file.read_text():
                      fail(f"Residual donation reference found: {needle} in {file}")

          print("Donation code removal verification passed.")
          PY

          cd "$SRC"

          git diff --check
          git rev-parse HEAD > "$OUT/XMRIG-COMMIT.txt"
          git diff > "$OUT/SOURCE-PATCH.diff"
          cp LICENSE "$OUT/LICENSE"

          cd "$SRC/scripts"
          ./build_deps.sh

          build_xmrig() {
            SOURCE_DIR="$1"
            BUILD_DIR="$2"
            OUTPUT_FILE="$3"

            cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" \
              -DCMAKE_BUILD_TYPE=Release \
              -DXMRIG_DEPS="$SOURCE_DIR/scripts/deps" \
              -DBUILD_STATIC=ON \
              -DARM_V8=ON \
              -DWITH_RANDOMX=ON \
              -DWITH_ARGON2=ON \
              -DWITH_TLS=ON \
              -DWITH_HWLOC=ON \
              -DWITH_ASM=ON \
              -DWITH_BENCHMARK=ON \
              -DWITH_ENV_VARS=ON \
              -DWITH_HTTP=OFF \
              -DWITH_DMI=OFF \
              -DWITH_MSR=OFF \
              -DWITH_OPENCL=OFF \
              -DWITH_CUDA=OFF \
              -DWITH_KAWPOW=OFF \
              -DWITH_GHOSTRIDER=OFF \
              -DWITH_CN_LITE=OFF \
              -DWITH_CN_HEAVY=OFF \
              -DWITH_CN_PICO=OFF \
              -DWITH_CN_FEMTO=OFF

            cmake --build "$BUILD_DIR" --parallel 2

            cp "$BUILD_DIR/xmrig" "$OUTPUT_FILE"
            chmod 755 "$OUTPUT_FILE"
            strip --strip-unneeded "$OUTPUT_FILE"
          }

          build_xmrig \
            "$SRC" \
            "$WORK/build-crypto" \
            "$OUT/runtime/xmrig-aarch64-crypto"

          cp -a "$SRC" "$BASE"

          python3 - "$BASE/cmake/cpu.cmake" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text()

          old = "CHECK_CXX_COMPILER_FLAG(-march=armv8-a+crypto XMRIG_ARM_CRYPTO)"
          new = "set(XMRIG_ARM_CRYPTO OFF)"

          count = text.count(old)

          if count != 1:
              raise SystemExit(f"Expected one ARM crypto compiler probe, found {count}")

          path.write_text(text.replace(old, new, 1))
          PY

          build_xmrig \
            "$BASE" \
            "$WORK/build-baseline" \
            "$OUT/runtime/xmrig-aarch64-baseline"

          cat > "$OUT/runtime/run.sh" <<'EOF'
          #!/bin/sh
          set -eu

          DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"

          if grep -Eiq '^[[:space:]]*[Ff]eatures[[:space:]]*:.*(^|[[:space:]])aes([[:space:]]|$)' /proc/cpuinfo 2>/dev/null; then
            exec "$DIR/xmrig-aarch64-crypto" "$@"
          fi

          exec "$DIR/xmrig-aarch64-baseline" "$@"
          EOF

          cat > "$OUT/runtime/verify.sh" <<'EOF'
          #!/bin/sh
          set -eu

          for BIN in xmrig-aarch64-baseline xmrig-aarch64-crypto
          do
            test -x "./$BIN"
            "./$BIN" --version

            if strings "./$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation-related runtime string found in $BIN"
              exit 1
            fi
          done

          echo "Verification passed."
          EOF

          cat > "$OUT/runtime/config.json.example" <<'EOF'
          {
            "autosave": false,
            "background": false,
            "donate-level": 0,
            "cpu": {
              "enabled": true,
              "huge-pages": true,
              "huge-pages-jit": true,
              "yield": false,
              "max-threads-hint": 100,
              "asm": true
            },
            "randomx": {
              "init": -1,
              "mode": "fast",
              "1gb-pages": false,
              "rdmsr": false,
              "wrmsr": false
            },
            "pools": [
              {
                "coin": "monero",
                "url": "POOL_HOST:PORT",
                "user": "YOUR_XMR_PUBLIC_ADDRESS",
                "pass": "aarch64-2c",
                "tls": true,
                "keepalive": true
              }
            ]
          }
          EOF

          chmod 755 "$OUT/runtime/run.sh"
          chmod 755 "$OUT/runtime/verify.sh"

          for BIN in "$OUT/runtime/xmrig-aarch64-baseline" "$OUT/runtime/xmrig-aarch64-crypto"
          do
            file "$BIN" | grep -qi "statically linked"

            if readelf -d "$BIN" 2>/dev/null | grep -q "NEEDED"
            then
              echo "Dynamic dependency detected in $BIN"
              exit 1
            fi

            "$BIN" --version

            if strings "$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation-related runtime string found in $BIN"
              exit 1
            fi
          done

          cat > "$OUT/BUILD-MANIFEST.txt" <<EOF
          XMRig tag: v6.26.0
          XMRig commit: $(git -C "$SRC" rev-parse HEAD)
          Build target: Linux aarch64 musl static
          Compiler environment: Alpine Linux musl
          Static dependencies: libuv, hwloc, OpenSSL
          Enabled: RandomX, Argon2, TLS, hwloc, ASM, benchmark, ARMv8
          Disabled: DonateStrategy, HTTP API, MSR, CUDA, OpenCL
          Binaries:
            xmrig-aarch64-baseline: ARMv8 baseline
            xmrig-aarch64-crypto: ARMv8 Crypto/AES extension build
          EOF

          cd "$OUT"
          sha256sum runtime/* > SHA256SUMS

          tar -czf xmrig-aarch64-musl-static-nodonate-v6.26.0.tar.gz \
            runtime \
            SHA256SUMS \
            BUILD-MANIFEST.txt \
            XMRIG-COMMIT.txt \
            SOURCE-PATCH.diff \
            LICENSE

          chmod -R a+rX "$OUT"
          SH

          chmod +x "$GITHUB_WORKSPACE/build.sh"

          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            alpine:3.21 \
            sh /work/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-aarch64-musl-static-nodonate-v6.26.0
          path: out/
          if-no-files-found: error
