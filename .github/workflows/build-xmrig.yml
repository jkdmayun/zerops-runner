name: Build XMRig ARM64 Static No-Donate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    steps:
      - name: Build fully static ARM64 binaries from official XMRig source
        shell: bash
        run: |
          set -euo pipefail

          cat > "$GITHUB_WORKSPACE/build.sh" <<'SH'
          #!/bin/sh
          set -eux

          apk add --no-cache \
            bash \
            git \
            build-base \
            cmake \
            autoconf \
            automake \
            libtool \
            pkgconf \
            linux-headers \
            perl \
            python3 \
            wget \
            tar \
            gzip \
            xz \
            ca-certificates \
            coreutils \
            file \
            binutils

          WORK="/work/work"
          OUT="/work/out"
          SRC="$WORK/xmrig"
          BASE="$WORK/xmrig-baseline"

          rm -rf "$WORK" "$OUT"
          mkdir -p "$WORK" "$OUT/runtime"

          git clone --depth 1 --branch v6.26.0 https://github.com/xmrig/xmrig.git "$SRC"

          EXPECTED_COMMIT="b2ca72480c58d197e18c885d9fc1a0c8d517e60a"
          ACTUAL_COMMIT="$(git -C "$SRC" rev-parse HEAD)"

          if [ "$ACTUAL_COMMIT" != "$EXPECTED_COMMIT" ]; then
            echo "Unexpected source commit: $ACTUAL_COMMIT"
            exit 1
          fi

          python3 - "$SRC" <<'PY'
          from pathlib import Path
          import re
          import sys

          src = Path(sys.argv[1])

          cmake_file = src / "CMakeLists.txt"
          network_cpp_file = src / "src/net/Network.cpp"
          network_h_file = src / "src/net/Network.h"
          donate_h_file = src / "src/donate.h"
          donate_cpp_file = src / "src/net/strategies/DonateStrategy.cpp"
          donate_strategy_h_file = src / "src/net/strategies/DonateStrategy.h"

          def fail(message):
              raise SystemExit(message)

          def replace_function(text, signature, replacement):
              start = text.find(signature)

              if start < 0:
                  fail(f"Function not found: {signature}")

              brace = text.find("{", start)

              if brace < 0:
                  fail(f"Opening brace not found: {signature}")

              depth = 0
              end = None

              for pos in range(brace, len(text)):
                  char = text[pos]

                  if char == "{":
                      depth += 1
                  elif char == "}":
                      depth -= 1

                      if depth == 0:
                          end = pos + 1
                          break

              if end is None:
                  fail(f"Closing brace not found: {signature}")

              return text[:start] + replacement.rstrip() + "\n" + text[end:]

          def write_clean(path, text):
              cleaned = "\n".join(line.rstrip() for line in text.splitlines()) + "\n"
              path.write_text(cleaned)

          cmake = cmake_file.read_text()
          cmake_lines = cmake.splitlines()

          removed_cmake_entries = 0
          new_cmake_lines = []

          for line in cmake_lines:
              if "src/net/strategies/DonateStrategy.h" in line:
                  removed_cmake_entries += 1
                  continue

              if "src/net/strategies/DonateStrategy.cpp" in line:
                  removed_cmake_entries += 1
                  continue

              new_cmake_lines.append(line)

          if removed_cmake_entries != 2:
              fail(f"Expected to remove 2 DonateStrategy CMake entries, removed {removed_cmake_entries}")

          write_clean(cmake_file, "\n".join(new_cmake_lines))

          network = network_cpp_file.read_text()
          network_lines = network.splitlines()

          replaced_include = 0
          new_network_lines = []

          for line in network_lines:
              if '#include "net/strategies/DonateStrategy.h"' in line:
                  new_network_lines.append('#include "base/kernel/interfaces/IStrategy.h"')
                  replaced_include += 1
                  continue

              new_network_lines.append(line)

          if replaced_include != 1:
              fail(f"Expected to replace 1 DonateStrategy include, replaced {replaced_include}")

          network = "\n".join(new_network_lines) + "\n"

          network = replace_function(
              network,
              "xmrig::Network::Network(Controller *controller)",
              r'''xmrig::Network::Network(Controller *controller) :
    m_controller(controller)
{
    JobResults::setListener(this, controller->config()->cpu().isHwAES());
    controller->addListener(this);

#   ifdef XMRIG_FEATURE_API
    controller->api()->addListener(this);
#   endif

    m_state = new NetworkState(this);
    m_strategy = controller->config()->pools().createStrategy(m_state);
    m_timer = new Timer(this, kTickInterval, kTickInterval);
}'''
          )

          network = replace_function(
              network,
              "xmrig::Network::~Network()",
              r'''xmrig::Network::~Network()
{
    JobResults::stop();

    delete m_timer;
    delete m_strategy;
    delete m_state;
}'''
          )

          network = replace_function(
              network,
              "void xmrig::Network::onActive(",
              r'''void xmrig::Network::onActive(IStrategy *, IClient *client)
{
    const auto &pool = client->pool();

#   ifdef XMRIG_FEATURE_BENCHMARK
    if (pool.mode() == Pool::MODE_BENCHMARK) {
        return;
    }
#   endif

    char zmq_buf[32] = {};

    if (client->pool().zmq_port() >= 0) {
        snprintf(zmq_buf, sizeof(zmq_buf), " (ZMQ:%d)", client->pool().zmq_port());
    }

    const char *tlsVersion = client->tlsVersion();

    LOG_INFO("%s " WHITE_BOLD("use %s ") CYAN_BOLD("%s:%d%s ") GREEN_BOLD("%s") " " BLACK_BOLD("%s"),
             Tags::network(),
             client->mode(),
             pool.host().data(),
             pool.port(),
             zmq_buf,
             tlsVersion ? tlsVersion : "",
             client->ip().data());

    const char *fingerprint = client->tlsFingerprint();

    if (fingerprint != nullptr) {
        LOG_INFO("%s " BLACK_BOLD("fingerprint (SHA-256): \"%s\""), Tags::network(), fingerprint);
    }
}'''
          )

          network = replace_function(
              network,
              "void xmrig::Network::onJob(",
              r'''void xmrig::Network::onJob(IStrategy *, IClient *client, const Job &job, const rapidjson::Value &)
{
    setJob(client, job);
}'''
          )

          network = replace_function(
              network,
              "void xmrig::Network::onJobResult(",
              r'''void xmrig::Network::onJobResult(const JobResult &result)
{
    m_strategy->submit(result);
}'''
          )

          network = replace_function(
              network,
              "void xmrig::Network::onPause(",
              r'''void xmrig::Network::onPause(IStrategy *)
{
    if (!m_strategy->isActive()) {
        LOG_ERR("%s " RED("no active pools, stop mining"), Tags::network());
        return m_controller->miner()->pause();
    }
}'''
          )

          network = replace_function(
              network,
              "void xmrig::Network::setJob(",
              r'''void xmrig::Network::setJob(IClient *, const Job &job)
{
    m_controller->miner()->setJob(job, false);
}'''
          )

          network = replace_function(
              network,
              "void xmrig::Network::tick()",
              r'''void xmrig::Network::tick()
{
    const uint64_t now = Chrono::steadyMSecs();

    m_strategy->tick(now);

#   ifdef XMRIG_FEATURE_API
    m_controller->api()->tick();
#   endif
}'''
          )

          write_clean(network_cpp_file, network)

          header = network_h_file.read_text()
          header_lines = header.splitlines()

          changed_setjob = 0
          removed_m_donate = 0
          new_header_lines = []

          for line in header_lines:
              if "void setJob(" in line and "bool donate" in line:
                  indent = line[:len(line) - len(line.lstrip())]
                  new_header_lines.append(f"{indent}void setJob(IClient *client, const Job &job);")
                  changed_setjob += 1
                  continue

              if "m_donate" in line:
                  removed_m_donate += 1
                  continue

              new_header_lines.append(line)

          if changed_setjob != 1:
              fail(f"Expected to rewrite one setJob declaration, changed {changed_setjob}")

          if removed_m_donate != 1:
              fail(f"Expected to remove one m_donate member, removed {removed_m_donate}")

          write_clean(network_h_file, "\n".join(new_header_lines))

          donate_h_file.write_text(
              """#ifndef XMRIG_DONATE_H
#define XMRIG_DONATE_H

constexpr const int kDefaultDonateLevel = 0;
constexpr const int kMinimumDonateLevel = 0;

#endif // XMRIG_DONATE_H
"""
          )

          if not donate_cpp_file.exists():
              fail("DonateStrategy.cpp missing before removal")

          if not donate_strategy_h_file.exists():
              fail("DonateStrategy.h missing before removal")

          donate_cpp_file.unlink()
          donate_strategy_h_file.unlink()

          for file in [cmake_file, network_cpp_file, network_h_file]:
              content = file.read_text()

              for forbidden in [
                  "DonateStrategy",
                  "m_donate",
                  "dev donate",
                  "donate.v2.xmrig.com",
                  "donate.ssl.xmrig.com",
              ]:
                  if forbidden in content:
                      fail(f"Residual forbidden text '{forbidden}' in {file}")

          if donate_cpp_file.exists() or donate_strategy_h_file.exists():
              fail("DonateStrategy files still exist after removal")

          if "kDefaultDonateLevel = 0" not in donate_h_file.read_text():
              fail("Default donation level was not set to 0")

          if "kMinimumDonateLevel = 0" not in donate_h_file.read_text():
              fail("Minimum donation level was not set to 0")

          print("Donation code removal verification passed.")
          PY

          cd "$SRC"

          git rev-parse HEAD > "$OUT/XMRIG-COMMIT.txt"
          git diff --binary > "$OUT/SOURCE-PATCH.diff"
          cp LICENSE "$OUT/LICENSE"

          cd "$SRC/scripts"
          ./build_deps.sh

          build_xmrig() {
            SOURCE_DIR="$1"
            BUILD_DIR="$2"
            OUTPUT_FILE="$3"

            cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" \
              -DCMAKE_BUILD_TYPE=Release \
              -DXMRIG_DEPS="$SOURCE_DIR/scripts/deps" \
              -DBUILD_STATIC=ON \
              -DCMAKE_EXE_LINKER_FLAGS="-static" \
              -DARM_V8=ON \
              -DWITH_RANDOMX=ON \
              -DWITH_ARGON2=ON \
              -DWITH_TLS=ON \
              -DWITH_HWLOC=ON \
              -DWITH_ASM=ON \
              -DWITH_BENCHMARK=ON \
              -DWITH_ENV_VARS=ON \
              -DWITH_HTTP=OFF \
              -DWITH_DMI=OFF \
              -DWITH_MSR=OFF \
              -DWITH_OPENCL=OFF \
              -DWITH_CUDA=OFF \
              -DWITH_KAWPOW=OFF \
              -DWITH_GHOSTRIDER=OFF \
              -DWITH_CN_LITE=OFF \
              -DWITH_CN_HEAVY=OFF \
              -DWITH_CN_PICO=OFF \
              -DWITH_CN_FEMTO=OFF

            cmake --build "$BUILD_DIR" --parallel 2

            cp "$BUILD_DIR/xmrig" "$OUTPUT_FILE"
            chmod 755 "$OUTPUT_FILE"
            strip --strip-unneeded "$OUTPUT_FILE"
          }

          build_xmrig \
            "$SRC" \
            "$WORK/build-crypto" \
            "$OUT/runtime/xmrig-aarch64-crypto"

          cp -a "$SRC" "$BASE"

          python3 - "$BASE/cmake/cpu.cmake" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text()

          old = "CHECK_CXX_COMPILER_FLAG(-march=armv8-a+crypto XMRIG_ARM_CRYPTO)"
          new = "set(XMRIG_ARM_CRYPTO OFF)"

          if old not in text:
              raise SystemExit("Could not locate ARM crypto compiler probe for baseline build")

          path.write_text(text.replace(old, new, 1))
          PY

          build_xmrig \
            "$BASE" \
            "$WORK/build-baseline" \
            "$OUT/runtime/xmrig-aarch64-baseline"

          cat > "$OUT/runtime/run.sh" <<'EOF'
          #!/bin/sh
          set -eu

          DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          VARIANT="${XMRIG_ARM_VARIANT:-auto}"

          case "$VARIANT" in
            crypto)
              exec "$DIR/xmrig-aarch64-crypto" "$@"
              ;;
            baseline)
              exec "$DIR/xmrig-aarch64-baseline" "$@"
              ;;
            auto)
              if awk '
                /^[Ff]eatures/ && $0 ~ /(^|[[:space:]])aes([[:space:]]|$)/ {
                  found = 1
                }
                END {
                  exit !found
                }
              ' /proc/cpuinfo 2>/dev/null
              then
                exec "$DIR/xmrig-aarch64-crypto" "$@"
              fi

              exec "$DIR/xmrig-aarch64-baseline" "$@"
              ;;
            *)
              echo "Invalid XMRIG_ARM_VARIANT: $VARIANT"
              echo "Allowed values: auto, crypto, baseline"
              exit 2
              ;;
          esac
          EOF

          cat > "$OUT/runtime/verify.sh" <<'EOF'
          #!/bin/sh
          set -eu

          for BIN in xmrig-aarch64-baseline xmrig-aarch64-crypto
          do
            test -x "./$BIN"
            "./$BIN" --version

            if strings "./$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation runtime string found in $BIN"
              exit 1
            fi
          done

          echo "Verification passed."
          EOF

          cat > "$OUT/runtime/config.json.example" <<'EOF'
          {
            "autosave": false,
            "background": false,
            "donate-level": 0,
            "cpu": {
              "enabled": true,
              "huge-pages": true,
              "huge-pages-jit": true,
              "yield": false,
              "max-threads-hint": 100,
              "asm": true
            },
            "randomx": {
              "init": -1,
              "mode": "fast",
              "1gb-pages": false,
              "rdmsr": false,
              "wrmsr": false
            },
            "pools": [
              {
                "coin": "monero",
                "url": "POOL_HOST:PORT",
                "user": "YOUR_XMR_PUBLIC_ADDRESS",
                "pass": "aarch64-2c",
                "tls": true,
                "keepalive": true
              }
            ]
          }
          EOF

          chmod 755 "$OUT/runtime/run.sh"
          chmod 755 "$OUT/runtime/verify.sh"

          for BIN in "$OUT/runtime/xmrig-aarch64-baseline" "$OUT/runtime/xmrig-aarch64-crypto"
          do
            if ! file "$BIN" | grep -qi "statically linked"; then
              echo "Binary is not statically linked: $BIN"
              exit 1
            fi

            if readelf -d "$BIN" 2>/dev/null | grep -q "NEEDED"; then
              echo "Dynamic dependency detected: $BIN"
              exit 1
            fi

            "$BIN" --version

            if strings "$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation runtime string found: $BIN"
              exit 1
            fi
          done

          cat > "$OUT/BUILD-MANIFEST.txt" <<EOF
          XMRig version: v6.26.0
          XMRig source commit: $(git -C "$SRC" rev-parse HEAD)
          Build target: Linux aarch64 musl static ELF
          Static dependencies: libuv, hwloc, OpenSSL
          Enabled: RandomX, Argon2, TLS, hwloc, ASM, benchmark, ARMv8
          Disabled: DonateStrategy, HTTP API, MSR, CUDA, OpenCL
          Binaries:
            xmrig-aarch64-baseline = ARMv8 generic compatibility build
            xmrig-aarch64-crypto = ARMv8 AES/crypto-extension build
          EOF

          cd "$OUT"

          sha256sum runtime/* > SHA256SUMS

          tar -czf xmrig-aarch64-musl-static-nodonate-v6.26.0.tar.gz \
            runtime \
            SHA256SUMS \
            BUILD-MANIFEST.txt \
            XMRIG-COMMIT.txt \
            SOURCE-PATCH.diff \
            LICENSE

          chmod -R a+rX "$OUT"
          SH

          chmod +x "$GITHUB_WORKSPACE/build.sh"

          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            alpine:3.21 \
            sh /work/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-aarch64-musl-static-nodonate-v6.26.0
          path: out/
          if-no-files-found: error
