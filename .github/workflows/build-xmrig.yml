name: Build XMRig ARM64 Static No-Donate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    steps:
      - name: Build fully static ARM64 XMRig from official source
        shell: bash
        run: |
          set -euo pipefail

          cat > "$GITHUB_WORKSPACE/build.sh" <<'SH'
          #!/bin/sh
          set -eux

          apk add --no-cache \
            bash \
            git \
            build-base \
            cmake \
            autoconf \
            automake \
            libtool \
            pkgconf \
            linux-headers \
            perl \
            python3 \
            wget \
            tar \
            gzip \
            xz \
            ca-certificates \
            coreutils \
            file \
            binutils

          WORK="/work/work"
          OUT="/work/out"
          SRC="$WORK/xmrig"
          BASE="$WORK/xmrig-baseline"

          rm -rf "$WORK" "$OUT"
          mkdir -p "$WORK" "$OUT/runtime"

          cd "$WORK"
          git clone --depth 1 --branch v6.26.0 https://github.com/xmrig/xmrig.git xmrig

          EXPECTED_COMMIT="b2ca72480c58d197e18c885d9fc1a0c8d517e60a"
          ACTUAL_COMMIT="$(git -C "$SRC" rev-parse HEAD)"

          if [ "$ACTUAL_COMMIT" != "$EXPECTED_COMMIT" ]; then
            echo "Unexpected XMRig source commit: $ACTUAL_COMMIT"
            exit 1
          fi

          python3 - "$SRC" <<'PY'
          from pathlib import Path
          import re
          import sys

          src = Path(sys.argv[1])

          cmake_file = src / "CMakeLists.txt"
          network_cpp = src / "src/net/Network.cpp"
          network_h = src / "src/net/Network.h"
          donate_h = src / "src/donate.h"
          donate_cpp = src / "src/net/strategies/DonateStrategy.cpp"
          donate_header = src / "src/net/strategies/DonateStrategy.h"

          def fail(message):
              raise SystemExit(message)

          def replace_once(text, old, new, label):
              count = text.count(old)

              if count != 1:
                  fail(f"{label}: expected 1 match, found {count}")

              return text.replace(old, new, 1)

          def regex_replace_once(text, pattern, replacement, label):
              result, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE)

              if count != 1:
                  fail(f"{label}: expected 1 match, found {count}")

              return result

          def remove_block(text, marker, label):
              start = text.find(marker)

              if start < 0:
                  fail(f"{label}: marker not found: {marker}")

              brace_start = text.find("{", start)

              if brace_start < 0:
                  fail(f"{label}: opening brace not found")

              depth = 0
              end = None

              for pos in range(brace_start, len(text)):
                  char = text[pos]

                  if char == "{":
                      depth += 1
                  elif char == "}":
                      depth -= 1

                      if depth == 0:
                          end = pos + 1
                          break

              if end is None:
                  fail(f"{label}: closing brace not found")

              while end < len(text) and text[end] in " \t":
                  end += 1

              if end < len(text) and text[end] == "\n":
                  end += 1

              return text[:start] + text[end:]

          cmake = cmake_file.read_text()

          cmake = regex_replace_once(
              cmake,
              r"^[ \t]*src/net/strategies/DonateStrategy\.h[ \t]*\n",
              "",
              "Remove DonateStrategy.h from CMakeLists.txt"
          )

          cmake = regex_replace_once(
              cmake,
              r"^[ \t]*src/net/strategies/DonateStrategy\.cpp[ \t]*\n",
              "",
              "Remove DonateStrategy.cpp from CMakeLists.txt"
          )

          cmake_file.write_text(cmake)

          network = network_cpp.read_text()

          network = replace_once(
              network,
              '#include "net/strategies/DonateStrategy.h"\n',
              '#include "base/kernel/interfaces/IStrategy.h"\n',
              "Replace DonateStrategy include with IStrategy include"
          )

          network = remove_block(
              network,
              "if (pools.donateLevel() > 0)",
              "Remove DonateStrategy construction block"
          )

          network = replace_once(
              network,
              "    delete m_donate;\n",
              "",
              "Remove m_donate destructor"
          )

          while "if (m_donate && m_donate == strategy)" in network:
              network = remove_block(
                  network,
                  "if (m_donate && m_donate == strategy)",
                  "Remove donation pause/active block"
              )

          network = remove_block(
              network,
              "if (m_donate && m_donate->isActive() && m_donate != strategy)",
              "Remove donation job interception block"
          )

          network = replace_once(
              network,
              "    setJob(client, job, m_donate == strategy);\n",
              "    setJob(client, job);\n",
              "Route all jobs to normal pool"
          )

          network = remove_block(
              network,
              "if (result.index == 1 && m_donate)",
              "Remove donation result routing block"
          )

          network = remove_block(
              network,
              "if (!donate && m_donate)",
              "Remove donation job update block"
          )

          network = remove_block(
              network,
              "if (m_donate)",
              "Remove donation tick block"
          )

          network = replace_once(
              network,
              "void xmrig::Network::setJob(IClient *client, const Job &job, bool donate)",
              "void xmrig::Network::setJob(IClient *client, const Job &job)",
              "Remove donate parameter from setJob definition"
          )

          network = replace_once(
              network,
              "    m_controller->miner()->setJob(job, donate);\n",
              "    m_controller->miner()->setJob(job, false);\n",
              "Force normal-pool job flag"
          )

          network_cpp.write_text(network)

          header = network_h.read_text()

          header = replace_once(
              header,
              "    void setJob(IClient *client, const Job &job, bool donate);\n",
              "    void setJob(IClient *client, const Job &job);\n",
              "Remove donate parameter from Network.h"
          )

          header = replace_once(
              header,
              "    IStrategy *m_donate = nullptr;\n",
              "",
              "Remove m_donate field from Network.h"
          )

          network_h.write_text(header)

          donate = donate_h.read_text()

          donate = re.sub(
              r"kDefaultDonateLevel\s*=\s*1",
              "kDefaultDonateLevel = 0",
              donate,
              count=1
          )

          donate = re.sub(
              r"kMinimumDonateLevel\s*=\s*1",
              "kMinimumDonateLevel = 0",
              donate,
              count=1
          )

          if "kDefaultDonateLevel = 0" not in donate:
              fail("Default donate level was not set to 0")

          if "kMinimumDonateLevel = 0" not in donate:
              fail("Minimum donate level was not set to 0")

          donate_h.write_text(donate)

          if not donate_cpp.exists() or not donate_header.exists():
              fail("DonateStrategy source files missing before deletion")

          donate_cpp.unlink()
          donate_header.unlink()

          verify_files = [
              cmake_file,
              network_cpp,
              network_h,
          ]

          forbidden = [
              "DonateStrategy",
              "m_donate",
              "dev donate",
              "donate.v2.xmrig.com",
              "donate.ssl.xmrig.com",
          ]

          for file in verify_files:
              content = file.read_text()

              for needle in forbidden:
                  if needle in content:
                      fail(f"Residual forbidden reference '{needle}' in {file}")

          print("Donation code removal verification passed.")
          PY

          cd "$SRC"

          git diff --check
          git rev-parse HEAD > "$OUT/XMRIG-COMMIT.txt"
          git diff --binary > "$OUT/SOURCE-PATCH.diff"
          cp LICENSE "$OUT/LICENSE"

          cd "$SRC/scripts"
          ./build_deps.sh

          build_xmrig() {
            SOURCE_DIR="$1"
            BUILD_DIR="$2"
            OUTPUT_FILE="$3"

            cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" \
              -DCMAKE_BUILD_TYPE=Release \
              -DXMRIG_DEPS="$SOURCE_DIR/scripts/deps" \
              -DBUILD_STATIC=ON \
              -DCMAKE_EXE_LINKER_FLAGS="-static" \
              -DARM_V8=ON \
              -DWITH_RANDOMX=ON \
              -DWITH_ARGON2=ON \
              -DWITH_TLS=ON \
              -DWITH_HWLOC=ON \
              -DWITH_ASM=ON \
              -DWITH_BENCHMARK=ON \
              -DWITH_ENV_VARS=ON \
              -DWITH_HTTP=OFF \
              -DWITH_DMI=OFF \
              -DWITH_MSR=OFF \
              -DWITH_OPENCL=OFF \
              -DWITH_CUDA=OFF \
              -DWITH_KAWPOW=OFF \
              -DWITH_GHOSTRIDER=OFF \
              -DWITH_CN_LITE=OFF \
              -DWITH_CN_HEAVY=OFF \
              -DWITH_CN_PICO=OFF \
              -DWITH_CN_FEMTO=OFF

            cmake --build "$BUILD_DIR" --parallel 2

            cp "$BUILD_DIR/xmrig" "$OUTPUT_FILE"
            chmod 755 "$OUTPUT_FILE"
            strip --strip-unneeded "$OUTPUT_FILE"
          }

          build_xmrig \
            "$SRC" \
            "$WORK/build-crypto" \
            "$OUT/runtime/xmrig-aarch64-crypto"

          cp -a "$SRC" "$BASE"

          python3 - "$BASE/cmake/cpu.cmake" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text()

          old = "CHECK_CXX_COMPILER_FLAG(-march=armv8-a+crypto XMRIG_ARM_CRYPTO)"
          new = "set(XMRIG_ARM_CRYPTO OFF)"

          count = text.count(old)

          if count != 1:
              raise SystemExit(f"Baseline patch failed: expected 1 match, found {count}")

          path.write_text(text.replace(old, new, 1))
          PY

          build_xmrig \
            "$BASE" \
            "$WORK/build-baseline" \
            "$OUT/runtime/xmrig-aarch64-baseline"

          cat > "$OUT/runtime/run.sh" <<'EOF'
          #!/bin/sh
          set -eu

          DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          VARIANT="${XMRIG_ARM_VARIANT:-auto}"

          case "$VARIANT" in
            crypto)
              exec "$DIR/xmrig-aarch64-crypto" "$@"
              ;;
            baseline)
              exec "$DIR/xmrig-aarch64-baseline" "$@"
              ;;
            auto)
              if awk '
                /^[Ff]eatures/ && $0 ~ /(^|[[:space:]])aes([[:space:]]|$)/ {
                  found=1
                }
                END {
                  exit !found
                }
              ' /proc/cpuinfo 2>/dev/null
              then
                exec "$DIR/xmrig-aarch64-crypto" "$@"
              fi

              exec "$DIR/xmrig-aarch64-baseline" "$@"
              ;;
            *)
              echo "Invalid XMRIG_ARM_VARIANT: $VARIANT"
              echo "Allowed values: auto, crypto, baseline"
              exit 2
              ;;
          esac
          EOF

          cat > "$OUT/runtime/verify.sh" <<'EOF'
          #!/bin/sh
          set -eu

          for BIN in xmrig-aarch64-baseline xmrig-aarch64-crypto
          do
            test -x "./$BIN"
            "./$BIN" --version

            if strings "./$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation runtime string found in $BIN"
              exit 1
            fi
          done

          echo "Verification passed."
          EOF

          cat > "$OUT/runtime/config.json.example" <<'EOF'
          {
            "autosave": false,
            "background": false,
            "donate-level": 0,
            "cpu": {
              "enabled": true,
              "huge-pages": true,
              "huge-pages-jit": true,
              "yield": false,
              "max-threads-hint": 100,
              "asm": true
            },
            "randomx": {
              "init": -1,
              "mode": "fast",
              "1gb-pages": false,
              "rdmsr": false,
              "wrmsr": false
            },
            "pools": [
              {
                "coin": "monero",
                "url": "POOL_HOST:PORT",
                "user": "YOUR_XMR_PUBLIC_ADDRESS",
                "pass": "aarch64-2c",
                "tls": true,
                "keepalive": true
              }
            ]
          }
          EOF

          chmod 755 "$OUT/runtime/run.sh"
          chmod 755 "$OUT/runtime/verify.sh"

          for BIN in "$OUT/runtime/xmrig-aarch64-baseline" "$OUT/runtime/xmrig-aarch64-crypto"
          do
            if ! file "$BIN" | grep -qi "statically linked"; then
              echo "Not a static binary: $BIN"
              exit 1
            fi

            if readelf -d "$BIN" 2>/dev/null | grep -q "NEEDED"; then
              echo "Dynamic library dependency detected: $BIN"
              exit 1
            fi

            "$BIN" --version

            if strings "$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation runtime string found: $BIN"
              exit 1
            fi
          done

          cat > "$OUT/BUILD-MANIFEST.txt" <<EOF
          XMRig version: v6.26.0
          XMRig source commit: $(git -C "$SRC" rev-parse HEAD)
          Target: Linux aarch64 musl static ELF
          Static dependencies: libuv, hwloc, OpenSSL
          Enabled: RandomX, Argon2, TLS, hwloc, ASM, benchmark, ARMv8
          Disabled: DonateStrategy, HTTP API, MSR, CUDA, OpenCL
          Binaries:
            xmrig-aarch64-baseline = ARMv8 generic
            xmrig-aarch64-crypto = ARMv8 + crypto/AES extension
          EOF

          cd "$OUT"
          sha256sum runtime/* > SHA256SUMS

          tar -czf xmrig-aarch64-musl-static-nodonate-v6.26.0.tar.gz \
            runtime \
            SHA256SUMS \
            BUILD-MANIFEST.txt \
            XMRIG-COMMIT.txt \
            SOURCE-PATCH.diff \
            LICENSE

          chmod -R a+rX "$OUT"
          SH

          chmod +x "$GITHUB_WORKSPACE/build.sh"

          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            alpine:3.21 \
            sh /work/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-aarch64-musl-static-nodonate-v6.26.0
          path: out/
          if-no-files-found: error
