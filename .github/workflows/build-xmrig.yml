name: Build XMRig ARM64 Static No-Donate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 50

    steps:
      - name: Build static ARM64 XMRig from official source
        shell: bash
        run: |
          set -euo pipefail

          cat > "$GITHUB_WORKSPACE/build.sh" <<'SH'
          #!/bin/sh
          set -eu

          apk add --no-cache \
            bash \
            git \
            build-base \
            cmake \
            autoconf \
            automake \
            libtool \
            pkgconf \
            linux-headers \
            perl \
            python3 \
            wget \
            tar \
            gzip \
            xz \
            ca-certificates \
            coreutils \
            file \
            binutils

          WORK="/work/work"
          OUT="/work/out"
          SRC="$WORK/xmrig"
          BASE="$WORK/xmrig-baseline"

          rm -rf "$WORK" "$OUT"
          mkdir -p "$WORK" "$OUT/runtime"

          cd "$WORK"

          git clone --depth 1 --branch v6.26.0 https://github.com/xmrig/xmrig.git xmrig

          EXPECTED_COMMIT="b2ca72480c58d197e18c885d9fc1a0c8d517e60a"
          ACTUAL_COMMIT="$(git -C "$SRC" rev-parse HEAD)"

          if [ "$ACTUAL_COMMIT" != "$EXPECTED_COMMIT" ]; then
            echo "Unexpected XMRig source commit: $ACTUAL_COMMIT"
            exit 1
          fi

          python3 - "$SRC" <<'PY'
          from pathlib import Path
          import re
          import sys

          src = Path(sys.argv[1])

          cmake_file = src / "CMakeLists.txt"
          network_cpp = src / "src/net/Network.cpp"
          donate_h = src / "src/donate.h"
          donate_cpp = src / "src/net/strategies/DonateStrategy.cpp"
          donate_header = src / "src/net/strategies/DonateStrategy.h"

          def require_single_sub(pattern, repl, text, label, flags=0):
              new_text, count = re.subn(pattern, repl, text, count=1, flags=flags)

              if count != 1:
                  raise SystemExit(f"{label}: expected exactly 1 match, found {count}")

              return new_text

          def remove_cpp_block(text, marker, label):
              start = text.find(marker)

              if start < 0:
                  raise SystemExit(f"{label}: marker not found")

              brace = text.find("{", start)

              if brace < 0:
                  raise SystemExit(f"{label}: opening brace not found")

              depth = 0
              end = None

              for pos in range(brace, len(text)):
                  char = text[pos]

                  if char == "{":
                      depth += 1
                  elif char == "}":
                      depth -= 1

                      if depth == 0:
                          end = pos + 1
                          break

              if end is None:
                  raise SystemExit(f"{label}: closing brace not found")

              while end < len(text) and text[end] in " \t":
                  end += 1

              if end < len(text) and text[end] == "\n":
                  end += 1

              return text[:start] + text[end:]

          cmake = cmake_file.read_text()

          cmake = require_single_sub(
              r'^[ \t]*src/net/strategies/DonateStrategy\.h[ \t]*\n',
              '',
              cmake,
              'Remove DonateStrategy.h from CMakeLists.txt',
              re.MULTILINE
          )

          cmake = require_single_sub(
              r'^[ \t]*src/net/strategies/DonateStrategy\.cpp[ \t]*\n',
              '',
              cmake,
              'Remove DonateStrategy.cpp from CMakeLists.txt',
              re.MULTILINE
          )

          cmake_file.write_text(cmake)

          network = network_cpp.read_text()

          network = require_single_sub(
              r'^#include "net/strategies/DonateStrategy\.h"\n',
              '',
              network,
              'Remove DonateStrategy include',
              re.MULTILINE
          )

          network = remove_cpp_block(
              network,
              'if (pools.donateLevel() > 0)',
              'Remove donation strategy construction block'
          )

          network_cpp.write_text(network)

          donate_h.write_text(
              """#ifndef XMRIG_DONATE_H
          #define XMRIG_DONATE_H

          constexpr const int kDefaultDonateLevel = 0;
          constexpr const int kMinimumDonateLevel = 0;

          #endif // XMRIG_DONATE_H
          """
          )

          if not donate_cpp.exists():
              raise SystemExit('DonateStrategy.cpp does not exist before deletion')

          if not donate_header.exists():
              raise SystemExit('DonateStrategy.h does not exist before deletion')

          donate_cpp.unlink()
          donate_header.unlink()

          verify_files = [
              src / 'CMakeLists.txt',
              src / 'src/net/Network.cpp',
              src / 'src/net/Network.h',
          ]

          for file in verify_files:
              data = file.read_text()

              if 'DonateStrategy' in data:
                  raise SystemExit(f'Residual DonateStrategy reference: {file}')

          if 'kDefaultDonateLevel = 0' not in donate_h.read_text():
              raise SystemExit('Default donation level was not changed to 0')

          if 'kMinimumDonateLevel = 0' not in donate_h.read_text():
              raise SystemExit('Minimum donation level was not changed to 0')

          if 'if (pools.donateLevel() > 0)' in network_cpp.read_text():
              raise SystemExit('Donation strategy creation code still exists')

          print('Donation removal verification passed.')
          PY

          cd "$SRC"

          git diff --check
          git rev-parse HEAD > "$OUT/XMRIG-COMMIT.txt"
          git diff > "$OUT/SOURCE-PATCH.diff"
          cp LICENSE "$OUT/LICENSE"

          cd "$SRC/scripts"
          ./build_deps.sh

          build_xmrig() {
            SOURCE_DIR="$1"
            BUILD_DIR="$2"
            OUTPUT_FILE="$3"

            cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" \
              -DCMAKE_BUILD_TYPE=Release \
              -DXMRIG_DEPS="$SOURCE_DIR/scripts/deps" \
              -DBUILD_STATIC=ON \
              -DARM_V8=ON \
              -DWITH_RANDOMX=ON \
              -DWITH_ARGON2=ON \
              -DWITH_TLS=ON \
              -DWITH_HWLOC=ON \
              -DWITH_ASM=ON \
              -DWITH_BENCHMARK=ON \
              -DWITH_ENV_VARS=ON \
              -DWITH_HTTP=OFF \
              -DWITH_DMI=OFF \
              -DWITH_MSR=OFF \
              -DWITH_OPENCL=OFF \
              -DWITH_CUDA=OFF \
              -DWITH_KAWPOW=OFF \
              -DWITH_GHOSTRIDER=OFF \
              -DWITH_CN_LITE=OFF \
              -DWITH_CN_HEAVY=OFF \
              -DWITH_CN_PICO=OFF \
              -DWITH_CN_FEMTO=OFF

            cmake --build "$BUILD_DIR" --parallel 2

            cp "$BUILD_DIR/xmrig" "$OUTPUT_FILE"
            chmod 755 "$OUTPUT_FILE"
            strip --strip-unneeded "$OUTPUT_FILE"
          }

          build_xmrig \
            "$SRC" \
            "$WORK/build-crypto" \
            "$OUT/runtime/xmrig-aarch64-crypto"

          cp -a "$SRC" "$BASE"

          python3 - "$BASE/cmake/cpu.cmake" <<'PY'
          from pathlib import Path
          import sys

          cpu_cmake = Path(sys.argv[1])
          text = cpu_cmake.read_text()

          old = 'CHECK_CXX_COMPILER_FLAG(-march=armv8-a+crypto XMRIG_ARM_CRYPTO)'
          new = 'set(XMRIG_ARM_CRYPTO OFF)'

          count = text.count(old)

          if count != 1:
              raise SystemExit(f'ARM crypto check replacement failed: expected 1 match, found {count}')

          cpu_cmake.write_text(text.replace(old, new, 1))
          PY

          build_xmrig \
            "$BASE" \
            "$WORK/build-baseline" \
            "$OUT/runtime/xmrig-aarch64-baseline"

          cat > "$OUT/runtime/run.sh" <<'EOF'
          #!/bin/sh
          set -eu

          DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"

          if grep -Eiq '^[[:space:]]*[Ff]eatures[[:space:]]*:.*(^|[[:space:]])aes([[:space:]]|$)' /proc/cpuinfo 2>/dev/null; then
            exec "$DIR/xmrig-aarch64-crypto" "$@"
          fi

          exec "$DIR/xmrig-aarch64-baseline" "$@"
          EOF

          cat > "$OUT/runtime/verify.sh" <<'EOF'
          #!/bin/sh
          set -eu

          for BIN in xmrig-aarch64-baseline xmrig-aarch64-crypto
          do
            test -x "./$BIN"
            "./$BIN" --version

            if strings "./$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation-related string found in $BIN"
              exit 1
            fi
          done

          echo "Verification passed: static binaries run and no donation runtime strings were found."
          EOF

          cat > "$OUT/runtime/config.json.example" <<'EOF'
          {
            "autosave": false,
            "background": false,
            "donate-level": 0,
            "cpu": {
              "enabled": true,
              "huge-pages": true,
              "huge-pages-jit": true,
              "yield": false,
              "max-threads-hint": 100,
              "asm": true
            },
            "randomx": {
              "init": -1,
              "mode": "fast",
              "1gb-pages": false,
              "rdmsr": false,
              "wrmsr": false
            },
            "pools": [
              {
                "coin": "monero",
                "url": "POOL_HOST:PORT",
                "user": "YOUR_XMR_PUBLIC_ADDRESS",
                "pass": "aarch64-2c",
                "tls": true,
                "keepalive": true
              }
            ]
          }
          EOF

          chmod 755 "$OUT/runtime/run.sh"
          chmod 755 "$OUT/runtime/verify.sh"

          for BIN in "$OUT/runtime/xmrig-aarch64-baseline" "$OUT/runtime/xmrig-aarch64-crypto"
          do
            file "$BIN" | grep -qi "statically linked"

            if readelf -d "$BIN" 2>/dev/null | grep -q "NEEDED"
            then
              echo "Dynamic library dependency found in $BIN"
              exit 1
            fi

            "$BIN" --version

            if strings "$BIN" | grep -Eqi 'donate\.v2\.xmrig\.com|donate\.ssl\.xmrig\.com|dev donate started|dev donate finished'
            then
              echo "Donation-related runtime string found in $BIN"
              exit 1
            fi
          done

          cat > "$OUT/BUILD-MANIFEST.txt" <<EOF
          XMRig tag: v6.26.0
          XMRig source commit: $(git -C "$SRC" rev-parse HEAD)
          Target: Linux aarch64, musl, static ELF
          Static dependencies: libuv, hwloc, OpenSSL
          Enabled: RandomX, Argon2, TLS, hwloc, ASM, benchmark, ARMv8
          Disabled: DonateStrategy, HTTP API, MSR, CUDA, OpenCL
          Output:
            xmrig-aarch64-baseline = ARMv8 general compatibility
            xmrig-aarch64-crypto   = ARMv8 AES/crypto-extension optimized
          EOF

          cd "$OUT"
          sha256sum runtime/* > SHA256SUMS

          tar -czf xmrig-aarch64-musl-static-nodonate-v6.26.0.tar.gz \
            runtime \
            SHA256SUMS \
            BUILD-MANIFEST.txt \
            XMRIG-COMMIT.txt \
            SOURCE-PATCH.diff \
            LICENSE

          chmod -R a+rX "$OUT"
          SH

          chmod +x "$GITHUB_WORKSPACE/build.sh"

          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            alpine:3.21 \
            sh /work/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-aarch64-musl-static-nodonate-v6.26.0
          path: out/
          if-no-files-found: error
